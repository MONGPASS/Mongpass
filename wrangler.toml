# Cloudflare Pages config for MongPass.
#
# After running `wrangler d1 create mongpass` and
# `wrangler r2 bucket create mongpass-images`, paste the
# returned database_id below. Pages env vars (GOOGLE_CLIENT_ID,
# GOOGLE_CLIENT_SECRET, ADMIN_EMAILS, AUTH_SECRET, R2_PUBLIC_URL)
# are set via the Cloudflare dashboard, not this file.

name = "mongpass"
compatibility_date = "2025-05-07"
compatibility_flags = ["nodejs_compat"]

# Pages: build output produced by `next-on-pages` lives here.
pages_build_output_dir = ".vercel/output/static"

# Bindings (D1, R2) are configured via the Cloudflare Pages dashboard,
# not via this file. The BETA wrangler.toml reader on Pages currently
# fails to attach D1/R2 bindings during Function publish even though
# the resources exist in the account, so we set them in the dashboard
# under Settings → Functions → Bindings:
#
#   D1 binding:    name=DB,     database=mongpass
#   R2 binding:    name=IMAGES, bucket=mongpass-images
#
# Once added in the dashboard they persist across deploys.
